<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVCONF 2026</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <header>

        <nav class="navbar">

            <div class="container">

                <div class="logo">
                    <img src="assets/logo.png" alt="Logo">
                </div>

                <ul class="links">
                    <li><a href="#">Speakers</a></li>
                    <li><a href="#">Schedule</a></li>
                    <li><a href="#">Tracks</a></li>
                    <li><a href="#">Venue</a></li>
                    <li><a href="#">Blog</a></li>
                </ul>

                <button class="btn">
                    Register Now
                </button>

            </div>

        </nav>

        <!-- Hero Section -->

        <section class="hero">

            <div class="overlay">

                <img src="assets/logo-mini.png" alt="Logo" class="hero-logo">

                <h1>Code.<em>Connect.</em>Create
                </h1>

                <p>
                    Join thousands of developers, designers and tech leaders
                    for three inspiring days of learning, networking and
                    innovation.
                </p>

                <button class="btn">Register Now</button>

            </div>

        </section>

    </header>

</body>

</html>
